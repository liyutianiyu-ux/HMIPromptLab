<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HMI × AI 提示词框架库</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F2EDE6;
    --bg2: #EAE3DA;
    --card: #FDFAF6;
    --dark: #2A2420;
    --mid: #5A4E46;
    --soft: #8C7B72;
    --accent1: #D4845A;   /* warm terracotta */
    --accent2: #5B8C6A;   /* forest green */
    --accent3: #7B94B8;   /* slate blue */
    --accent4: #C4A85A;   /* golden */
    --accent5: #B06B8A;   /* dusty rose */
    --accent6: #6B94A8;   /* muted teal */
    --border: rgba(42,36,32,0.1);
    --shadow: 0 4px 24px rgba(42,36,32,0.08);
    --shadow-hover: 0 12px 40px rgba(42,36,32,0.16);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans SC', sans-serif;
    background: var(--bg);
    color: var(--dark);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── GRAIN OVERLAY ── */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events: none; z-index: 0; opacity: 0.4;
  }

  /* ── HEADER ── */
  header {
    position: sticky; top: 0; z-index: 100;
    background: rgba(242,237,230,0.92);
    backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--border);
    padding: 0 2.5rem;
    display: flex; align-items: center; justify-content: space-between;
    height: 64px;
  }

  .logo {
    font-family: 'Sora', sans-serif;
    font-weight: 700; font-size: 1.1rem;
    letter-spacing: -0.02em; color: var(--dark);
    display: flex; align-items: center; gap: 10px;
  }
  .logo-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--accent1); display: inline-block;
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100%{transform:scale(1);opacity:1} 50%{transform:scale(1.4);opacity:.7} }

  .header-tag {
    font-size: 0.72rem; font-weight: 500;
    background: var(--dark); color: var(--bg);
    padding: 4px 12px; border-radius: 20px;
    letter-spacing: 0.06em;
  }

  /* ── HERO ── */
  .hero {
    padding: 5rem 2.5rem 3.5rem;
    max-width: 900px; margin: 0 auto;
    text-align: center; position: relative; z-index: 1;
  }

  .hero-eyebrow {
    font-size: 0.75rem; font-weight: 500;
    letter-spacing: 0.15em; text-transform: uppercase;
    color: var(--accent1); margin-bottom: 1.2rem;
    display: flex; align-items: center; justify-content: center; gap: 10px;
  }
  .hero-eyebrow::before, .hero-eyebrow::after {
    content: ''; width: 40px; height: 1px; background: var(--accent1); opacity: 0.5;
  }

  .hero h1 {
    font-family: 'Sora', sans-serif;
    font-size: clamp(2.4rem, 5vw, 3.8rem);
    font-weight: 700; line-height: 1.1;
    letter-spacing: -0.03em; color: var(--dark);
    margin-bottom: 1.2rem;
  }
  .hero h1 span { color: var(--accent1); }

  .hero p {
    font-size: 1rem; color: var(--mid);
    line-height: 1.8; max-width: 560px; margin: 0 auto 2.5rem;
  }

  /* ── SEARCH & FILTER ── */
  .controls {
    max-width: 860px; margin: 0 auto 2.5rem;
    padding: 0 2.5rem;
    display: flex; gap: 1rem; flex-wrap: wrap;
    align-items: center; position: relative; z-index: 1;
  }

  .search-wrap {
    flex: 1; min-width: 220px; position: relative;
  }
  .search-wrap input {
    width: 100%; padding: 12px 16px 12px 44px;
    background: var(--card); border: 1px solid var(--border);
    border-radius: 12px; font-family: 'Noto Sans SC', sans-serif;
    font-size: 0.9rem; color: var(--dark);
    outline: none; transition: border-color .2s, box-shadow .2s;
  }
  .search-wrap input:focus {
    border-color: var(--accent1);
    box-shadow: 0 0 0 3px rgba(212,132,90,0.12);
  }
  .search-wrap input::placeholder { color: var(--soft); }
  .search-icon {
    position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
    width: 18px; height: 18px; color: var(--soft);
  }

  .filter-tabs {
    display: flex; gap: 6px; flex-wrap: wrap;
  }
  .filter-btn {
    padding: 8px 16px; border-radius: 20px; border: 1px solid var(--border);
    background: var(--card); font-family: 'Noto Sans SC', sans-serif;
    font-size: 0.8rem; color: var(--mid); cursor: pointer;
    transition: all .2s; white-space: nowrap;
  }
  .filter-btn:hover { border-color: var(--accent1); color: var(--accent1); }
  .filter-btn.active {
    background: var(--dark); color: var(--bg);
    border-color: var(--dark);
  }

  /* ── COUNT BAR ── */
  .count-bar {
    max-width: 860px; margin: 0 auto 1.5rem;
    padding: 0 2.5rem;
    font-size: 0.8rem; color: var(--soft);
    display: flex; align-items: center; gap: 6px;
    position: relative; z-index: 1;
  }
  .count-num {
    font-family: 'Sora', sans-serif; font-weight: 700;
    color: var(--accent1); font-size: 1rem;
  }

  /* ── GRID ── */
  .grid {
    max-width: 860px; margin: 0 auto;
    padding: 0 2.5rem 5rem;
    display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 1.2rem; position: relative; z-index: 1;
  }

  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 1.4rem;
    cursor: pointer;
    transition: transform .25s cubic-bezier(.34,1.56,.64,1), box-shadow .25s ease;
    position: relative; overflow: hidden;
    animation: fadeIn .4s ease both;
  }
  @keyframes fadeIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }

  .card:hover {
    transform: translateY(-4px);
    box-shadow: var(--shadow-hover);
  }

  .card-accent-bar {
    position: absolute; top: 0; left: 0; right: 0;
    height: 3px; border-radius: 18px 18px 0 0;
  }

  .card-header {
    display: flex; align-items: flex-start;
    justify-content: space-between; margin-bottom: 0.8rem;
    margin-top: 0.4rem;
  }

  .card-badge {
    width: 48px; height: 48px; border-radius: 14px;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Sora', sans-serif; font-weight: 700;
    font-size: 1.15rem; letter-spacing: -0.04em;
    flex-shrink: 0;
  }

  .card-meta {
    text-align: right;
  }
  .card-complexity {
    display: flex; gap: 3px; justify-content: flex-end; margin-bottom: 4px;
  }
  .dot-fill { width: 6px; height: 6px; border-radius: 50%; }
  .card-parts {
    font-size: 0.68rem; color: var(--soft);
  }

  .card-title {
    font-family: 'Sora', sans-serif; font-weight: 700;
    font-size: 1.05rem; color: var(--dark);
    margin-bottom: 0.35rem; letter-spacing: -0.02em;
  }

  .card-subtitle {
    font-size: 0.75rem; color: var(--accent1);
    font-weight: 500; margin-bottom: 0.6rem;
    letter-spacing: 0.02em;
  }

  .card-desc {
    font-size: 0.8rem; color: var(--mid);
    line-height: 1.6; margin-bottom: 1rem;
  }

  .card-tags {
    display: flex; gap: 5px; flex-wrap: wrap;
  }
  .tag {
    font-size: 0.65rem; padding: 3px 8px;
    border-radius: 6px; font-weight: 500;
    background: var(--bg2); color: var(--mid);
  }

  .card-arrow {
    position: absolute; bottom: 1.2rem; right: 1.2rem;
    width: 28px; height: 28px; border-radius: 8px;
    background: var(--bg2); display: flex; align-items: center; justify-content: center;
    transition: background .2s, transform .2s;
  }
  .card:hover .card-arrow {
    background: var(--dark); transform: translate(2px,-2px);
  }
  .card:hover .card-arrow svg { color: white; }
  .card-arrow svg { width: 14px; height: 14px; color: var(--mid); }

  /* ── MODAL ── */
  .overlay {
    position: fixed; inset: 0; z-index: 200;
    background: rgba(42,36,32,0.55);
    backdrop-filter: blur(8px);
    display: flex; align-items: center; justify-content: center;
    padding: 1.5rem;
    opacity: 0; pointer-events: none;
    transition: opacity .3s ease;
  }
  .overlay.open { opacity: 1; pointer-events: all; }

  .modal {
    background: var(--card);
    border-radius: 24px;
    max-width: 620px; width: 100%;
    max-height: 88vh; overflow-y: auto;
    padding: 2rem;
    position: relative;
    transform: scale(0.94) translateY(20px);
    transition: transform .35s cubic-bezier(.34,1.56,.64,1);
    scrollbar-width: thin; scrollbar-color: var(--border) transparent;
  }
  .overlay.open .modal { transform: scale(1) translateY(0); }

  .modal-close {
    position: absolute; top: 1.2rem; right: 1.2rem;
    width: 36px; height: 36px; border-radius: 10px;
    background: var(--bg2); border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background .2s;
    font-size: 1.1rem; color: var(--mid);
  }
  .modal-close:hover { background: var(--border); }

  .modal-accent { height: 4px; border-radius: 4px; margin-bottom: 1.5rem; }

  .modal-header {
    display: flex; align-items: center; gap: 1rem;
    margin-bottom: 1.2rem;
  }

  .modal-badge {
    width: 60px; height: 60px; border-radius: 18px;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Sora', sans-serif; font-weight: 700;
    font-size: 1.4rem; letter-spacing: -0.04em;
    flex-shrink: 0;
  }

  .modal-title {
    font-family: 'Sora', sans-serif; font-weight: 700;
    font-size: 1.6rem; letter-spacing: -0.03em; color: var(--dark);
    line-height: 1.1;
  }
  .modal-subtitle {
    font-size: 0.85rem; color: var(--soft); margin-top: 4px;
  }

  .modal-desc {
    font-size: 0.9rem; color: var(--mid); line-height: 1.7;
    margin-bottom: 1.5rem; padding: 1rem;
    background: var(--bg2); border-radius: 12px;
  }

  .steps-label {
    font-size: 0.75rem; font-weight: 600; letter-spacing: 0.1em;
    text-transform: uppercase; color: var(--soft); margin-bottom: 0.8rem;
  }

  .steps { display: flex; flex-direction: column; gap: 0.7rem; margin-bottom: 1.8rem; }

  .step {
    display: flex; gap: 1rem; align-items: flex-start;
    padding: 0.9rem 1rem;
    background: var(--bg); border-radius: 12px;
    border: 1px solid var(--border);
    transition: border-color .2s;
  }
  .step:hover { border-color: rgba(212,132,90,0.3); }

  .step-letter {
    width: 36px; height: 36px; border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Sora', sans-serif; font-weight: 700;
    font-size: 1rem; flex-shrink: 0;
  }

  .step-body { flex: 1; }
  .step-name {
    font-weight: 600; font-size: 0.92rem; color: var(--dark);
    display: flex; align-items: center; gap: 8px; margin-bottom: 3px;
  }
  .step-en { font-family: 'Sora', sans-serif; font-size: 0.7rem; color: var(--soft); font-weight: 400; }
  .step-example { font-size: 0.8rem; color: var(--mid); line-height: 1.55; }
  .step-example strong { color: var(--soft); font-weight: 500; }

  /* ── TEMPLATE SECTION ── */
  .template-section { margin-bottom: 1.5rem; }
  .template-label {
    font-size: 0.75rem; font-weight: 600; letter-spacing: 0.1em;
    text-transform: uppercase; color: var(--soft); margin-bottom: 0.6rem;
    display: flex; align-items: center; justify-content: space-between;
  }

  .template-box {
    background: var(--dark); color: #e8dfd5;
    border-radius: 12px; padding: 1rem 1.1rem;
    font-size: 0.82rem; line-height: 1.7;
    position: relative;
    font-family: 'Noto Sans SC', monospace;
  }
  .template-box .ph { color: var(--accent4); }

  .copy-btn {
    position: absolute; top: 0.7rem; right: 0.7rem;
    padding: 5px 12px; border-radius: 8px;
    background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.15);
    color: rgba(255,255,255,0.7); font-size: 0.7rem; cursor: pointer;
    font-family: 'Noto Sans SC', sans-serif;
    transition: all .2s;
  }
  .copy-btn:hover { background: rgba(255,255,255,0.2); color: white; }
  .copy-btn.copied { background: var(--accent2); color: white; border-color: var(--accent2); }

  /* ── HMI SCENARIO ── */
  .hmi-scene {
    padding: 0.9rem 1rem;
    background: linear-gradient(135deg, rgba(91,140,106,0.08), rgba(107,148,168,0.08));
    border: 1px solid rgba(91,140,106,0.2);
    border-radius: 12px;
    margin-bottom: 1.5rem;
  }
  .hmi-scene-title {
    font-size: 0.72rem; font-weight: 600; letter-spacing: 0.08em;
    text-transform: uppercase; color: var(--accent2); margin-bottom: 0.5rem;
    display: flex; align-items: center; gap: 6px;
  }
  .hmi-scene p { font-size: 0.82rem; color: var(--mid); line-height: 1.6; }

  /* ── EMPTY STATE ── */
  .empty {
    grid-column: 1/-1; text-align: center; padding: 4rem 2rem;
  }
  .empty-icon { font-size: 3rem; margin-bottom: 1rem; }
  .empty p { color: var(--soft); font-size: 0.9rem; }

  /* ── FOOTER ── */
  footer {
    text-align: center; padding: 2rem;
    font-size: 0.75rem; color: var(--soft);
    border-top: 1px solid var(--border);
    position: relative; z-index: 1;
  }

  /* ── SCROLLBAR ── */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  @media (max-width: 600px) {
    header { padding: 0 1.2rem; }
    .hero { padding: 3rem 1.2rem 2rem; }
    .controls, .count-bar, .grid { padding-left: 1.2rem; padding-right: 1.2rem; }
    .grid { grid-template-columns: 1fr; }
    .modal { padding: 1.5rem; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <span class="logo-dot"></span>
    HMI Prompt Lab
  </div>
  <span class="header-tag">HMI 设计师 AI 工具箱</span>
</header>

<section class="hero">
  <div class="hero-eyebrow">Prompt Engineering Frameworks</div>
  <h1>提示词<span>框架</span>速查库</h1>
  <p>精选 20 套主流 AI 提示词框架，每套均已适配 HMI 设计场景，帮助你更快、更精准地与 AI 协作</p>
</section>

<div class="controls">
  <div class="search-wrap">
    <svg class="search-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
        d="M21 21l-4.35-4.35M17 11A6 6 0 1 1 5 11a6 6 0 0 1 12 0z"/>
    </svg>
    <input type="text" id="searchInput" placeholder="搜索框架名称或关键词…" oninput="filterCards()">
  </div>
  <div class="filter-tabs" id="filterTabs">
    <button class="filter-btn active" onclick="setFilter('all', this)">全部</button>
    <button class="filter-btn" onclick="setFilter('简单', this)">简单 (3步)</button>
    <button class="filter-btn" onclick="setFilter('中等', this)">中等 (4步)</button>
    <button class="filter-btn" onclick="setFilter('复杂', this)">复杂 (5步+)</button>
  </div>
</div>

<div class="count-bar">
  <span class="count-num" id="countNum">20</span>
  <span>个框架</span>
</div>

<div class="grid" id="cardGrid"></div>

<div class="overlay" id="overlay" onclick="closeModal(event)">
  <div class="modal" id="modal"></div>
</div>

<footer>
  HMI Prompt Lab · 内容整理自公开提示词资料，场景由 AI 辅助适配 · 2025
</footer>

<script>
const COLORS = ['#D4845A','#5B8C6A','#7B94B8','#C4A85A','#B06B8A','#6B94A8','#8A7BC4','#8AAD6B','#C4826B','#6BA8C4'];

let activeFilter = 'all';

function getColor(id) {
  const idx = frameworks.findIndex(f => f.id === id);
  return COLORS[idx % COLORS.length];
}
function getBg(id) {
  const idx = frameworks.findIndex(f => f.id === id);
  return BG_COLORS[idx % BG_COLORS.length];
}

function complexityLabel(c) {
  if (c === 1) return '简单';
  if (c === 2) return '中等';
  return '复杂';
}

function renderCards(list) {
  const grid = document.getElementById('cardGrid');
  const count = document.getElementById('countNum');
  count.textContent = list.length;

  if (list.length === 0) {
    grid.innerHTML = `<div class="empty"><div class="empty-icon">🔍</div><p>没有找到匹配的框架，试试其他关键词</p></div>`;
    return;
  }

  grid.innerHTML = list.map((f, i) => {
    const color = getColor(f.id);
    const bg = getBg(f.id);
    const dots = [1,2,3].map(d => `<div class="dot-fill" style="background:${d<=f.complexity?color:'#e0d8d0'}"></div>`).join('');
    return `
    <div class="card" onclick="openModal('${f.id}')" style="animation-delay:${i*0.04}s">
      <div class="card-accent-bar" style="background:${color}"></div>
      <div class="card-header">
        <div class="card-badge" style="background:${bg};color:${color}">${f.name}</div>
        <div class="card-meta">
          <div class="card-complexity">${dots}</div>
          <div class="card-parts">${complexityLabel(f.complexity)} · ${f.steps.length} 步</div>
        </div>
      </div>
      <div class="card-title">${f.name} 框架</div>
      <div class="card-subtitle">${f.subtitle}</div>
      <div class="card-desc">${f.desc}</div>
      <div class="card-tags">${f.tags.map(t=>`<span class="tag">${t}</span>`).join('')}</div>
      <div class="card-arrow">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 17L17 7M7 7h10v10"/>
        </svg>
      </div>
    </div>`;
  }).join('');
}

function setFilter(val, btn) {
  activeFilter = val;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  filterCards();
}

function filterCards() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  let list = frameworks;
  if (activeFilter !== 'all') list = list.filter(f => complexityLabel(f.complexity) === activeFilter);
  if (q) list = list.filter(f =>
    f.name.toLowerCase().includes(q) ||
    f.subtitle.includes(q) ||
    f.desc.includes(q) ||
    f.tags.some(t => t.includes(q))
  );
  renderCards(list);
}

function openModal(id) {
  const f = frameworks.find(x => x.id === id);
  if (!f) return;
  const color = getColor(id);
  const bg = getBg(id);

  const stepsHtml = f.steps.map(s => `
    <div class="step">
      <div class="step-letter" style="background:${bg};color:${color}">${s.letter}</div>
      <div class="step-body">
        <div class="step-name">${s.name} <span class="step-en">${s.en}</span></div>
        <div class="step-example"><strong>示例：</strong>${s.example}</div>
      </div>
    </div>
  `).join('');

  const tplHtml = f.template.replace(/<ph>(.*?)<\/ph>/g, `<span class="ph">$1</span>`);

  document.getElementById('modal').innerHTML = `
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div class="modal-accent" style="background:${color}"></div>
    <div class="modal-header">
      <div class="modal-badge" style="background:${bg};color:${color}">${f.name}</div>
      <div>
        <div class="modal-title">${f.name} 框架</div>
        <div class="modal-subtitle">${f.subtitle}</div>
      </div>
    </div>
    <div class="modal-desc">${f.desc}</div>

    <div class="hmi-scene">
      <div class="hmi-scene-title">
        <svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17H4a2 2 0 01-2-2V5a2 2 0 012-2h16a2 2 0 012 2v10a2 2 0 01-2 2h-1"/>
        </svg>
        HMI 设计师使用场景
      </div>
      <p>${f.hmiScene}</p>
    </div>

    <div class="steps-label">框架拆解</div>
    <div class="steps">${stepsHtml}</div>

    <div class="template-section">
      <div class="template-label">
        <span>提示词模版</span>
      </div>
      <div class="template-box">
        <button class="copy-btn" onclick="copyTemplate(this, \`${f.template.replace(/`/g,'\\`')}\`)">复制</button>
        ${tplHtml}
      </div>
    </div>
  `;

  document.getElementById('overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal(e) {
  if (e && e.target !== document.getElementById('overlay')) return;
  document.getElementById('overlay').classList.remove('open');
  document.body.style.overflow = '';
}

function copyTemplate(btn, text) {
  const clean = text.replace(/<[^>]+>/g, '');
  navigator.clipboard.writeText(clean).then(() => {
    btn.textContent = '已复制 ✓';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = '复制'; btn.classList.remove('copied'); }, 2000);
  });
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') { document.getElementById('overlay').classList.remove('open'); document.body.style.overflow = ''; }
});

renderCards(frameworks);
</script>
